<svg xmlns="http://www.w3.org/2000/svg" width="980" height="700" viewBox="0 0 980 700" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowDark" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowEsc" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="490" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">四级稀疏激活路由 · Four-Tier Sparse Activation</text>
  <text x="490" y="65" text-anchor="middle" font-size="13" fill="#64748b">总库可无限增长,单次激活恒为「共享层 + 3~4 个领域子集」——规模与激活量解耦</text>

  <!-- Row 1: query -> router ; router -> escape -->
  <rect x="60" y="98" width="120" height="46" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="120" y="126" text-anchor="middle" font-size="15" fill="#0f172a">查询 query</text>

  <line x1="180" y1="121" x2="252" y2="121" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="254" y="94" width="160" height="54" rx="8" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="334" y="116" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">路由器 Router</text>
  <text x="334" y="135" text-anchor="middle" font-size="11.5" fill="#ddd6fe">gating · top-k 选领域</text>

  <!-- router -> escape valve (low confidence) -->
  <line x1="414" y1="121" x2="688" y2="121" stroke="#ea580c" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowEsc)"/>
  <text x="548" y="113" text-anchor="middle" font-size="11.5" fill="#ea580c">置信不足时回退</text>
  <rect x="690" y="98" width="230" height="46" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="805" y="120" text-anchor="middle" font-size="13.5" font-weight="600" fill="#9a3412">逃生阀:全局检索</text>
  <text x="805" y="136" text-anchor="middle" font-size="11" fill="#c2630e">隔离是优化,不是牢笼</text>

  <!-- L0 shared layer -->
  <rect x="60" y="178" width="860" height="58" rx="9" fill="#1e3a5f" stroke="#152b46" stroke-width="1.5"/>
  <text x="80" y="203" font-size="15.5" font-weight="600" fill="#ffffff">L0 共享层(shared expert · 始终在线)</text>
  <text x="80" y="223" font-size="12.5" fill="#cbd5e1">核心自我 · 通用能力 · 跨域元概念 —— 无条件注入,不参与路由</text>
  <text x="900" y="213" text-anchor="end" font-size="11.5" font-style="italic" fill="#93c5fd">恒定高权重</text>

  <!-- router down into domain row -->
  <line x1="334" y1="148" x2="334" y2="178" stroke="#94a3b8" stroke-width="2"/>
  <line x1="157" y1="236" x2="157" y2="286" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="379" y1="236" x2="379" y2="286" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="601" y1="236" x2="601" y2="286" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Domain row: L1 / L2a / L2b / cold -->
  <rect x="60" y="288" width="195" height="92" rx="9" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="157" y="317" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">L1 主领域</text>
  <text x="157" y="339" text-anchor="middle" font-size="12" fill="#dbeafe">top-1 路由命中</text>
  <text x="157" y="358" text-anchor="middle" font-size="12" fill="#dbeafe">全量检索 · 高权</text>

  <rect x="282" y="288" width="195" height="92" rx="9" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="379" y="317" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1e3a5f">L2 邻接领域 ①</text>
  <text x="379" y="339" text-anchor="middle" font-size="12" fill="#1e3a5f">via domain_affinity</text>
  <text x="379" y="358" text-anchor="middle" font-size="12" fill="#1e3a5f">次相关 · 低权</text>

  <rect x="504" y="288" width="195" height="92" rx="9" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="601" y="317" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1e3a5f">L2 邻接领域 ②</text>
  <text x="601" y="339" text-anchor="middle" font-size="12" fill="#1e3a5f">via domain_affinity</text>
  <text x="601" y="358" text-anchor="middle" font-size="12" fill="#1e3a5f">次相关 · 低权</text>

  <rect x="726" y="288" width="194" height="92" rx="9" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="823" y="317" text-anchor="middle" font-size="14.5" font-weight="700" fill="#64748b">冷领域 · 沉睡</text>
  <text x="823" y="339" text-anchor="middle" font-size="12" fill="#94a3b8">默认不参与路由</text>
  <text x="823" y="358" text-anchor="middle" font-size="12" fill="#94a3b8">可被唤醒</text>

  <!-- L3 cross-domain spreading edges (amber dashed) -->
  <line x1="255" y1="334" x2="282" y2="334" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowAmber)" marker-start="url(#arrowAmber)"/>
  <line x1="477" y1="334" x2="504" y2="334" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowAmber)" marker-start="url(#arrowAmber)"/>
  <path d="M157,380 C157,410 601,410 601,380" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowAmber)"/>
  <text x="379" y="428" text-anchor="middle" font-size="12.5" font-weight="600" fill="#b45309">L3 沿 cross-memory 边跨域扩散 1 跳(记忆粒度,不受领域墙约束)</text>

  <!-- arrows into fusion -->
  <line x1="157" y1="380" x2="300" y2="452" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="379" y1="380" x2="420" y2="452" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="601" y1="380" x2="560" y2="452" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="490" y1="236" x2="490" y2="452" stroke="#3b82f6" stroke-width="1.6" stroke-dasharray="2 3" marker-end="url(#arrow)"/>
  <line x1="805" y1="144" x2="700" y2="452" stroke="#ea580c" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrowEsc)"/>

  <!-- Fusion ranking -->
  <rect x="245" y="454" width="490" height="54" rx="9" fill="#475569" stroke="#334155" stroke-width="1.5"/>
  <text x="490" y="478" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">融合排序 Fusion Ranking</text>
  <text x="490" y="497" text-anchor="middle" font-size="11.5" fill="#cbd5e1">路由权 × 记忆相关度 × FSRS retrievability × (1 + arousal/surprise)</text>

  <!-- outputs -->
  <line x1="380" y1="508" x2="310" y2="556" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowDark)"/>
  <line x1="490" y1="508" x2="490" y2="556" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowDark)"/>
  <line x1="600" y1="508" x2="670" y2="556" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowDark)"/>

  <rect x="235" y="558" width="150" height="42" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="310" y="584" text-anchor="middle" font-size="13.5" fill="#334155">flat 扁平</text>
  <rect x="415" y="558" width="150" height="42" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="490" y="584" text-anchor="middle" font-size="13.5" fill="#334155">tiered 分层</text>
  <rect x="595" y="558" width="150" height="42" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="670" y="584" text-anchor="middle" font-size="13.5" fill="#334155">narrative 叙事</text>

  <!-- footnote -->
  <text x="490" y="632" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">命中的前瞻预测与路由决策异步喂给 reflect(离线巩固),不阻塞热路径</text>

  <!-- Legend -->
  <g font-size="11.5" fill="#475569">
    <rect x="60" y="652" width="15" height="15" rx="3" fill="#1e3a5f"/>
    <text x="82" y="664">L0 恒定</text>
    <rect x="156" y="652" width="15" height="15" rx="3" fill="#2563eb"/>
    <text x="178" y="664">L1 高权</text>
    <rect x="252" y="652" width="15" height="15" rx="3" fill="#bfdbfe" stroke="#60a5fa"/>
    <text x="274" y="664">L2 中权</text>
    <line x1="348" y1="660" x2="372" y2="660" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="5 3"/>
    <text x="380" y="664">L3 跨域边</text>
    <rect x="470" y="652" width="15" height="15" rx="3" fill="#e2e8f0" stroke="#cbd5e1"/>
    <text x="492" y="664">冷领域沉睡</text>
    <line x1="588" y1="660" x2="612" y2="660" stroke="#ea580c" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="620" y="664">逃生阀回退</text>
  </g>
</svg>
